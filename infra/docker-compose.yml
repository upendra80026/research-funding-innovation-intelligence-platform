version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: research_postgres
    restart: always
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: innovation_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: